<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIIPL Audit Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
</style>
<script>
  window.addEventListener('error', function(e) {
    const root = document.getElementById('root');
    if (root && !root.hasChildNodes()) {
      root.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:600px;margin:60px auto;background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;color:#991B1B;">' +
        '<h2 style="margin:0 0 12px;">Dashboard failed to load</h2>' +
        '<p style="margin:0 0 8px;">Error: ' + (e.message || 'Unknown error') + '</p>' +
        '<p style="font-size:13px;color:#7F1D1D;">This usually means a required script (React, Recharts, or Babel) failed to load from the CDN. Check your internet connection and try refreshing.</p>' +
        '</div>';
    }
  });
</script>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-source">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, Cell } = Recharts;


const D = {

      areas:{ "Inventory Mgmt":{c:3,h:0,m:8,l:2,t:13}, "Repairs & Maint.":{c:1,h:2,m:3,l:1,t:8}, "Human Resource":{c:1,h:1,m:0,l:0,t:2}, Sales:{c:1,h:3,m:4,l:2,t:11}, Procurement:{c:0,h:4,m:5,l:6,t:15}, "Quality Mgmt":{c:0,h:3,m:6,l:0,t:9}, Logistics:{c:0,h:1,m:4,l:1,t:6} } },

      areas:{ "Inventory Mgmt":{c:2,h:1,m:6,l:1,t:10}, "Human Resource":{c:1,h:1,m:4,l:0,t:6}, Sales:{c:0,h:6,m:2,l:0,t:8}, "Repairs & Maint.":{c:0,h:4,m:2,l:0,t:6}, Procurement:{c:0,h:2,m:8,l:1,t:11}, "Quality Mgmt":{c:0,h:1,m:4,l:1,t:6}, Logistics:{c:0,h:0,m:6,l:2,t:8} } },
    Gurugram:  { critical:4,  high:15, medium:25, low:7,  total:51, avgMonthlySales:4.65,  repeatedObs:19, openPriorObs:41, limitations:16, weakestArea:"Inventory Mgmt (13)", highestCriticalArea:"Inventory Mgmt (3)",
      areas:{ "Inventory Mgmt":{c:3,h:4,m:5,l:1,t:13}, "Human Resource":{c:1,h:2,m:4,l:1,t:8}, Procurement:{c:0,h:2,m:6,l:0,t:8}, Sales:{c:0,h:2,m:3,l:2,t:7}, "Quality Mgmt":{c:0,h:2,m:2,l:0,t:4}, Logistics:{c:1,h:3,m:2,l:0,t:6}, "Repairs & Maint.":{c:0,h:2,m:2,l:1,t:5} } },
  },
  financialImpact: {

    missedRevenueSavings:    { total:1927.86, byUnit:{ Hinjewadi:1418.10,Sanand:142.07, Chakan:165.11, Gurugram:21.88, Rudrapur:180.71 } },
    alreadyIncurredLosses:   { total:34.00,   byUnit:{ Hinjewadi:30.08, Sanand:1.06,   Chakan:0.03,   Gurugram:1.20,  Rudrapur:1.63 } },
  },
  commonObservations: [
    { process:"Inventory",       obs:"Standard vs Actual Consumption not monitored / BOM inadequate",    risk:"Critical", units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Inventory",       obs:"Min-Max inventory levels not defined / not followed",               risk:"High",     units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Inventory",       obs:"Multiple infrastructural issues with store",                        risk:"Medium",   units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Inventory",       obs:"No monitoring of goods in transit",                                 risk:"Medium",   units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Inventory",       obs:"No action taken for non-moving / obsolete inventory",              risk:"Critical", units:["Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Inventory",       obs:"Wastage (cuttings) management not done properly",                  risk:"Medium",   units:["Sanand","Chakan","Hinjewadi"] },
    { process:"Inventory",       obs:"No proper tagging / labelling in warehouse",                        risk:"Medium",   units:["Sanand","Chakan","Hinjewadi"] },
    { process:"Inventory",       obs:"No reconciliation between Excel stock records and CMC",            risk:"High",     units:["Chakan","Hinjewadi"] },
    { process:"Human Resource",  obs:"Non-compliance with applicable laws",                              risk:"Critical", units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Human Resource",  obs:"Failure to adhere to PPE guidelines",                             risk:"Medium",   units:["Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Human Resource",  obs:"Absence of agreement with contractor & contractor license",       risk:"High",     units:["Chakan","Hinjewadi"] },
    { process:"Human Resource",  obs:"Overtime done by workers for continuous 23+ days",                risk:"High",     units:["Chakan","Hinjewadi"] },
    { process:"Quality",         obs:"No action for repetitive customer complaints / no RCA",           risk:"High",     units:["Sanand","Chakan","Hinjewadi"] },
    { process:"Quality",         obs:"Non-performance of first piece inspection",                        risk:"Medium",   units:["Sanand","Chakan","Hinjewadi"] },
    { process:"Quality",         obs:"No analysis of rejection/rework — overtime vs normal time",       risk:"Medium",   units:["Sanand","Chakan","Hinjewadi"] },
    { process:"Sales",           obs:"Delay in generation of IRN for credit notes",                     risk:"Medium",   units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Sales",           obs:"Discrepancies in planned vs actual dispatch / sales",             risk:"High",     units:["Sanand","Chakan","Hinjewadi"] },
    { process:"Sales",           obs:"No scrap policy / improper wastage management",                   risk:"Low",      units:["Chakan","Hinjewadi"] },
    { process:"Logistics",       obs:"No safety checklist for security personnel",                      risk:"Medium",   units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Logistics",       obs:"Lack of controls in selection of transporters",                   risk:"Medium",   units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Logistics",       obs:"No due diligence of transporter",                                 risk:"Medium",   units:["Sanand","Chakan","Hinjewadi"] },
    { process:"Logistics",       obs:"No agreement with transporter",                                   risk:"Medium",   units:["Chakan","Hinjewadi"] },
    { process:"Procurement",     obs:"Purchases from unapproved vendors",                               risk:"High",     units:["Gurugram","Sanand","Chakan","Hinjewadi","Rudrapur"] },
    { process:"Procurement",     obs:"Improper accounting of purchase transactions",                    risk:"High",     units:["Gurugram","Sanand","Chakan","Hinjewadi"] },
    { process:"Procurement",     obs:"Lack of maintenance of production halt records",                  risk:"Medium",   units:["Gurugram","Sanand","Hinjewadi","Rudrapur"] },
    { process:"Procurement",     obs:"No agreement with suppliers",                                     risk:"Medium",   units:["Gurugram","Sanand","Hinjewadi","Rudrapur"] },
    { process:"Procurement",     obs:"Inconsistent rate with different suppliers for same material",    risk:"Medium",   units:["Sanand","Rudrapur"] },
    { process:"Repairs & Maint.",obs:"No root cause analysis for recurring breakdowns",                 risk:"High",     units:["Chakan","Hinjewadi"] },
  ],
  repeatedObsByArea: {
    "Inventory Mgmt":   { Hinjewadi:6, Gurugram:5, Chakan:4, Sanand:6, Rudrapur:3 },
    "Logistics":        { Hinjewadi:3, Gurugram:5, Chakan:3, Sanand:1, Rudrapur:1 },
    "Repairs & Maint.": { Hinjewadi:5, Gurugram:2, Chakan:1, Sanand:1, Rudrapur:0 },
    "Human Resource":   { Hinjewadi:2, Gurugram:3, Chakan:3, Sanand:1, Rudrapur:0 },
    "Sales":            { Hinjewadi:2, Gurugram:0, Chakan:3, Sanand:2, Rudrapur:1 },
    "Quality Mgmt":     { Hinjewadi:3, Gurugram:1, Chakan:1, Sanand:2, Rudrapur:1 },
    "Procurement":      { Hinjewadi:1, Gurugram:3, Chakan:1, Sanand:1, Rudrapur:1 },
  },
  priorOpenByArea: {
    "Human Resource":   { Gurugram:10, Sanand:10, Chakan:3, Hinjewadi:4, Rudrapur:0 },
    "Inventory Mgmt":   { Gurugram:9,  Sanand:6,  Chakan:5, Hinjewadi:1, Rudrapur:2 },
    "Logistics":        { Gurugram:8,  Sanand:4,  Chakan:3, Hinjewadi:2, Rudrapur:2 },
    "Procurement":      { Gurugram:7,  Sanand:1,  Chakan:1, Hinjewadi:1, Rudrapur:1 },
    "Repairs & Maint.": { Gurugram:2,  Sanand:2,  Chakan:2, Hinjewadi:3, Rudrapur:0 },
    "Sales":            { Gurugram:4,  Sanand:2,  Chakan:2, Hinjewadi:1, Rudrapur:0 },
    "Quality Mgmt":     { Gurugram:1,  Sanand:2,  Chakan:1, Hinjewadi:2, Rudrapur:1 },
  },
  limitations: { Sanand:50, Gurugram:16, Hinjewadi:13, Rudrapur:12, Chakan:5 },
};

// ── Colours ───────────────────────────────────────────────────────────────────
const RC = {
  Critical:{ fg:"#991B1B", bg:"#FEF2F2", border:"#FECACA", dot:"#EF4444" },
  High:    { fg:"#9A3412", bg:"#FFF7ED", border:"#FED7AA", dot:"#F97316" },
  Medium:  { fg:"#854D0E", bg:"#FEFCE8", border:"#FEF08A", dot:"#F59E0B" },
  Low:     { fg:"#166534", bg:"#F0FDF4", border:"#BBF7D0", dot:"#22C55E" },
};
const UC = { Hinjewadi:"#3B82F6", Sanand:"#F97316", Rudrapur:"#8B5CF6", Chakan:"#10B981", Gurugram:"#EC4899" };

// ── Small helpers ─────────────────────────────────────────────────────────────
const Chip = ({ level }) => {
  const c = RC[level] || RC.Low;
  return (
    <span style={{ display:"inline-block", background:c.bg, color:c.fg, border:`1px solid ${c.border}`,
      borderRadius:4, padding:"2px 8px", fontSize:11, fontWeight:700, whiteSpace:"nowrap", lineHeight:"18px" }}>
      {level}
    </span>
  );
};

function Stack({ c=0, h=0, m=0, l=0, t, height=7 }) {
  if (!t) return <div style={{ height, background:"#E5E7EB", borderRadius:3 }} />;
  return (
    <div style={{ display:"flex", height, borderRadius:3, overflow:"hidden", gap:1 }}>
      {[{v:c,col:"#EF4444"},{v:h,col:"#F97316"},{v:m,col:"#F59E0B"},{v:l,col:"#22C55E"}]
        .map((s,i) => s.v > 0 && <div key={i} style={{ flex:s.v, background:s.col }} />)}
    </div>
  );
}

// Highlight best/worst in a column
function hlCell(key, val, badHigh) {
  const vals = D.units.map(u => D.unitData[u][key]).filter(v => typeof v === "number");
  const max = Math.max(...vals), min = Math.min(...vals);
  if (badHigh  && val === max) return { background:"#FEF2F2", color:"#DC2626", fontWeight:800 };
  if (badHigh  && val === min) return { background:"#F0FDF4", color:"#16A34A", fontWeight:800 };
  if (!badHigh && val === max) return { background:"#F0FDF4", color:"#16A34A", fontWeight:800 };
  return {};
}

// Section wrapper
const Section = ({ title, sub, accent="#1D4ED8", children }) => (
  <div style={{ background:"#fff", borderRadius:12, border:"1px solid #E5E7EB",
    padding:"24px 28px", marginBottom:20 }}>
    <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:20,
      paddingBottom:16, borderBottom:"1px solid #F1F5F9" }}>
      <div style={{ width:4, minHeight:40, background:accent, borderRadius:2, flexShrink:0, marginTop:2 }} />
      <div>
        <div style={{ fontSize:16, fontWeight:800, color:"#0F172A", lineHeight:1.3 }}>{title}</div>
        {sub && <div style={{ fontSize:12, color:"#6B7280", marginTop:4 }}>{sub}</div>}
      </div>
    </div>
    {children}
  </div>
);

// Shared table styles
const TH = (align="center") => ({
  padding:"9px 12px", textAlign:align, color:"#6B7280", fontSize:11,
  fontWeight:700, letterSpacing:.4, borderBottom:"2px solid #E5E7EB",
  background:"#F8FAFC", whiteSpace:"nowrap"
});
const TD = (align="center", extra={}) => ({
  padding:"9px 12px", textAlign:align, fontSize:13, ...extra
});

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function Overview() {
  const chartData = D.units.map(u => ({
    name:u,
    Observations: D.unitData[u].total,
    "Avg Sales (Cr)": D.unitData[u].avgMonthlySales,
  }));
  return (
    <Section title="Overview" sub={`Phase 1 · FY ${D.fy} · Units: ${D.units.join(", ")}`} accent="#1D4ED8">
      {/* KPI row */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14, marginBottom:28 }}>
        {[
          { label:"Total Observations",    val:D.overview.total,            col:"#1D4ED8", bg:"#EFF6FF" },
          { label:"Repeated Observations", val:D.overview.totalRepeatedObs, col:"#D97706", bg:"#FFFBEB" },
          { label:"Prior Year Still Open", val:D.overview.totalOpenPriorObs,col:"#7C3AED", bg:"#F5F3FF" },
        ].map(k => (
          <div key={k.label} style={{ background:k.bg, borderRadius:10, padding:"18px 20px" }}>
            <div style={{ fontSize:34, fontWeight:900, color:k.col, lineHeight:1 }}>{k.val}</div>
            <div style={{ fontSize:12, color:"#6B7280", marginTop:6, fontWeight:600 }}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* Unit risk summary table */}
      <div style={{ marginBottom:28, overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr>
              <th style={TH("left")}>UNIT</th>
              <th style={TH()}>CRITICAL</th>
              <th style={TH()}>HIGH</th>
              <th style={TH()}>MEDIUM</th>
              <th style={TH()}>LOW</th>
              <th style={TH()}>TOTAL</th>
              <th style={{ ...TH(), width:120 }}>SPLIT</th>
            </tr>
          </thead>
          <tbody>
            {D.units.map((u, i) => {
              const ud = D.unitData[u];
              return (
                <tr key={u} style={{ background:i%2===0?"#fff":"#FAFAFA", borderBottom:"1px solid #F3F4F6" }}>
                  <td style={TD("left", { fontWeight:700, color:"#0F172A" })}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:UC[u], flexShrink:0 }} />
                      {u}
                    </div>
                  </td>
                  {["critical","high","medium","low"].map(k => {
                    const cap = k[0].toUpperCase()+k.slice(1);
                    const v = ud[k];
                    return (
                      <td key={k} style={TD()}>
                        {v > 0
                          ? <span style={{ background:RC[cap].bg, color:RC[cap].fg, borderRadius:5,
                              padding:"2px 10px", fontWeight:700, fontSize:12 }}>{v}</span>
                          : <span style={{ color:"#D1D5DB" }}>—</span>}
                      </td>
                    );
                  })}
                  <td style={TD("center", { fontWeight:800, color:"#0F172A" })}>{ud.total}</td>
                  <td style={{ padding:"9px 12px" }}>
                    <Stack c={ud.critical} h={ud.high} m={ud.medium} l={ud.low} t={ud.total} height={8} />
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Chart */}
      <div style={{ fontSize:13, fontWeight:700, color:"#374151", marginBottom:10 }}>
        Observations vs Avg Monthly Sales (₹ Cr) by Unit
      </div>
      <ResponsiveContainer width="100%" height={220}>
        <BarChart data={chartData} margin={{ top:4, right:16, bottom:4, left:0 }} barGap={4}>
          <XAxis dataKey="name" tick={{ fontSize:12, fill:"#6B7280" }} axisLine={false} tickLine={false} />
          <YAxis yAxisId="l" tick={{ fontSize:11, fill:"#6B7280" }} axisLine={false} tickLine={false} />
          <YAxis yAxisId="r" orientation="right" tick={{ fontSize:11, fill:"#6B7280" }} axisLine={false} tickLine={false} />
          <Tooltip contentStyle={{ borderRadius:8, border:"1px solid #E5E7EB", fontSize:12 }} />
          <Legend wrapperStyle={{ fontSize:12 }} />
          <Bar yAxisId="l" dataKey="Observations" radius={[5,5,0,0]} maxBarSize={40}>
            {D.units.map(u => <Cell key={u} fill={UC[u]} />)}
          </Bar>
          <Bar yAxisId="r" dataKey="Avg Sales (Cr)" fill="#CBD5E1" radius={[5,5,0,0]} maxBarSize={40} />
        </BarChart>
      </ResponsiveContainer>
    </Section>
  );
}

// ── KEY INSTANCES ─────────────────────────────────────────────────────────────
function KeyInstances() {
  return (
    <Section title="Key Instances — Audit at a Glance" sub="Standout findings across all Phase 1 units" accent="#DC2626">
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:14 }}>
        {D.keyInstances.map((item, i) => (
          <div key={i} style={{ display:"flex", gap:16, alignItems:"flex-start",
            background:"#F8FAFC", borderRadius:10, padding:"16px 18px",
            borderLeft:"3px solid #1D4ED8" }}>
            <div style={{ fontSize:26, fontWeight:900, color:"#1D4ED8",
              minWidth:64, lineHeight:1.1, flexShrink:0 }}>{item.metric}</div>
            <div style={{ fontSize:13, color:"#374151", lineHeight:1.65 }}>{item.label}</div>
          </div>
        ))}
      </div>
    </Section>
  );
}

// ── FINANCIAL IMPACT ──────────────────────────────────────────────────────────
function FinancialImpact() {
  const fi = D.financialImpact;
  const cats = [
    { key:"potentialRevenueSavings", label:"Potential Revenue / Savings",  col:"#059669", bg:"#F0FDF4" },
    { key:"potentialFutureLosses",   label:"Potential Future Losses",       col:"#D97706", bg:"#FFFBEB" },
    { key:"missedRevenueSavings",    label:"Missed Revenue / Savings",      col:"#DC2626", bg:"#FEF2F2" },
    { key:"alreadyIncurredLosses",   label:"Already Incurred Losses",       col:"#7C3AED", bg:"#F5F3FF" },
  ];
  const chartData = cats.map(cat => {
    const row = { name: cat.label.split(" ").slice(0,2).join(" ") };
    D.units.forEach(u => { row[u] = fi[cat.key].byUnit[u] || 0; });
    return row;
  });
  return (
    <Section title="Observations with Financial Impact" sub="All amounts in ₹ Lakhs" accent="#D97706">
      {/* Total cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:14, marginBottom:24 }}>
        {cats.map(cat => (
          <div key={cat.key} style={{ background:cat.bg, borderRadius:10, padding:"16px 18px" }}>
            <div style={{ fontSize:11, fontWeight:700, color:cat.col, letterSpacing:.5, marginBottom:6 }}>
              {cat.label.toUpperCase()}
            </div>
            <div style={{ fontSize:28, fontWeight:900, color:cat.col }}>
              ₹{fi[cat.key].total.toLocaleString("en-IN")} L
            </div>
          </div>
        ))}
      </div>

      {/* Detail table */}
      <div style={{ overflowX:"auto", marginBottom:24 }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead>
            <tr>
              <th style={TH("left")}>CATEGORY</th>
              {D.units.map(u => <th key={u} style={TH()}>{u}</th>)}
              <th style={TH()}>TOTAL</th>
            </tr>
          </thead>

      {/* Top bar */}
      <div style={{ background:"#0F172A", padding:"0 24px", position:"sticky", top:0, zIndex:50,
        boxShadow:"0 1px 0 rgba(255,255,255,.06)" }}>
        <div style={{ maxWidth:1380, margin:"0 auto", display:"flex",
          alignItems:"center", justifyContent:"space-between", height:52 }}>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <span style={{ fontWeight:900, color:"#EF4444", fontSize:16, letterSpacing:.2 }}>NCLS</span>
            <div style={{ width:1, height:18, background:"#374151" }} />
            <span style={{ fontSize:13, color:"#E2E8F0", fontWeight:600 }}>
              SI Interpack Private Limited · Executive Summary
            </span>
            <span style={{ background:"#1E3A5F", color:"#93C5FD", borderRadius:5,
              padding:"2px 9px", fontSize:11, fontWeight:700 }}>
              Phase 1 · FY 2024-25
            </span>
          </div>
          <span style={{ fontSize:11, color:"#6B7280", display:"flex", gap:8 }}>
            {D.units.map(u => (
              <span key={u} style={{ display:"flex", alignItems:"center", gap:4 }}>
                <span style={{ width:6, height:6, borderRadius:"50%", background:UC[u], display:"inline-block" }} />
                <span>{u}</span>
              </span>
            ))}
          </span>
        </div>
      </div>

      {/* Tab nav */}
      <div style={{ background:"#fff", borderBottom:"1px solid #E2E8F0",
        padding:"0 24px", overflowX:"auto", position:"sticky", top:52, zIndex:40 }}>
        <div style={{ maxWidth:1380, margin:"0 auto", display:"flex" }}>
          {NAV.map(item => (
            <button key={item.id} onClick={() => setActive(item.id)} style={{
              background:"transparent", border:"none",
              padding:"13px 16px",
              fontWeight: active===item.id ? 800 : 500,
              fontSize:13,
              color: active===item.id ? "#1D4ED8" : "#64748B",
              cursor:"pointer",
              borderBottom: active===item.id ? "3px solid #1D4ED8" : "3px solid transparent",
              whiteSpace:"nowrap",
              transition:"color .15s, border-color .15s"
            }}>{item.label}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth:1380, margin:"0 auto", padding:"24px" }}>
        {render()}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>

  const source = document.getElementById('app-source').textContent;
  const transformed = Babel.transform(source, { presets: [['react', { runtime: 'classic' }]] }).code;
  const script = document.createElement('script');
  script.textContent = transformed;
  document.body.appendChild(script);
</script>
</body>
